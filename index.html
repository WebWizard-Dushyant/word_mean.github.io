<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#F9F8F6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Vocab">
    <title>Vocab</title>
    
    <style>
        :root {
            --font-serif: 'Georgia', 'Times New Roman', serif;
            --font-sans: system-ui, -apple-system, sans-serif;

            /* Light Theme (Purple Accent) */
            --bg-color: #FFFFFF;          
            --container-bg: #F8F9FA;      
            --surface-hover: #F1F3F5;     
            --text-primary: #1A1D20;      
            --text-secondary: #5F6368;    
            --border-color: #E9ECEF;      
            --accent-color: #7C3AED;      /* Vibrant Purple */
            --accent-hover: #6D28D9;      
            --danger-color: #FA5252;      
            --card-bg: #FFFFFF;
            --default-cover: linear-gradient(135deg, #E9ECEF, #CED4DA);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        body.warm-mode {
            /* Warm/Sepia Theme */
            --bg-color: #FDF6E3;          
            --container-bg: #F4E8D1;
            --surface-hover: #EBE0C8;
            --text-primary: #4A3F35;      
            --text-secondary: #7A6E62;
            --border-color: #DCD0B6;
            --accent-color: #D97736;      
            --accent-hover: #B85F26;      
            --danger-color: #D65C5C;
            --card-bg: #FDF6E3;
            --default-cover: linear-gradient(135deg, #DCD0B6, #C7BA9F);
        }

        body.dark-mode {
            /* Dark Theme */
            --bg-color: #121212;          
            --container-bg: #1A1A1A;
            --surface-hover: #242424;
            --text-primary: #E0E0E0;      
            --text-secondary: #888888;
            --border-color: #2D2D2D;
            --accent-color: #9D6BFF;      /* Light Purple for dark mode */
            --accent-hover: #B38CFF;      
            --danger-color: #FF6B6B;
            --card-bg: #1A1A1A;
            --default-cover: linear-gradient(135deg, #2D2D2D, #1A1A1A);
        }

        body {
            font-family: var(--font-sans); background-color: var(--bg-color);
            color: var(--text-primary); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            height: 100vh; overflow: hidden; /* Prevent body scroll, use inner scrolling */
        }

        /* Hide scrollbars globally */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; box-sizing: border-box; }

        .app-container {
            width: 100%; height: calc(100vh - 60px); /* Leave room for bottom nav */
            max-width: 1200px;
            display: flex; flex-direction: column;
        }

        /* Tabs/Views */
        .app-view { display: none; height: 100%; width: 100%; overflow-y: auto; padding: 1.5rem; }
        .app-view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 10px; 
        }
        .nav-title { margin: 0; font-size: 1.8rem; font-weight: 600; font-family: var(--font-serif); color: var(--text-primary); }
        .nav-actions { display: flex; gap: 8px; flex-wrap: wrap;}
        
        .pill-btn {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-weight: 500; font-size: 0.85rem; 
            transition: all 0.2s ease; display: flex; align-items: center; gap: 6px;
        }
        .pill-btn:hover { border-color: var(--text-secondary); background: var(--surface-hover); }
        .action-btn { 
            padding: 12px 24px; font-size: 0.95rem; font-weight: 500; background-color: var(--accent-color); color: #FFF; 
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; white-space: nowrap; 
        }
        .action-btn:hover { background-color: var(--accent-hover); transform: translateY(-1px);}

        .creation-area { display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap;}
        .creation-area input { 
            flex: 1; min-width: 200px; padding: 12px 16px; font-size: 1rem; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--container-bg); color: var(--text-primary); outline: none; 
        }
        .drop-zone {
            flex: 1; min-width: 250px; border: 2px dashed var(--border-color); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
            font-size: 0.9rem; cursor: pointer; padding: 10px; text-align: center; transition: all 0.2s;
        }
        .drop-zone.drag-over { border-color: var(--accent-color); background: rgba(124, 58, 237, 0.05); }

        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
        .book-card {
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px;
            transition: all 0.2s ease; position: relative; display: flex; flex-direction: column; cursor: grab;
        }
        .book-card:hover { border-color: var(--text-secondary); transform: translateY(-3px); box-shadow: var(--shadow-sm); }
        .book-cover { height: 200px; width: 100%; background: var(--default-cover); background-size: cover; background-position: center; border-radius: 6px; margin-bottom: 12px; pointer-events: none; }
        .book-info { text-align: center; padding: 4px; pointer-events: none; }
        .book-info h3 { margin: 0 0 4px 0; color: var(--text-primary); font-size: 1.1rem; font-family: var(--font-serif); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .book-info p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); }

        /* Kebab Menu */
        .kebab-container { position: absolute; top: 15px; right: 15px; z-index: 50; }
        .kebab-btn { background: rgba(0,0,0,0.5); color: #FFF; border: none; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; backdrop-filter: blur(4px); }
        .dropdown-menu {
            position: absolute; top: 35px; right: 0; background: var(--container-bg); border: 1px solid var(--border-color);
            border-radius: 8px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; padding: 5px 0;
            opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.2s ease; width: 160px;
        }
        .dropdown-menu.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .dropdown-item { padding: 10px 15px; background: transparent; border: none; color: var(--text-primary); text-align: left; cursor: pointer; font-size: 0.85rem; }
        .dropdown-item:hover { background: var(--surface-hover); color: var(--accent-color); }
        .dropdown-item.danger { color: var(--danger-color); }

        .table-wrapper { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid var(--border-color);}
        table { width: 100%; border-collapse: collapse; min-width: 800px; background: var(--container-bg);}
        th, td { padding: 15px; text-align: left; vertical-align: middle; border-bottom: 1px solid var(--border-color);}
        th { color: var(--text-secondary); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; background: var(--bg-color);}
        
        .td-word { font-weight: 600; color: var(--text-primary); font-size: 1.1rem; font-family: var(--font-serif); display: flex; align-items: center; gap: 8px;}
        .audio-btn { background: transparent; border: none; font-size: 1rem; cursor: pointer; opacity: 0.6; transition: opacity 0.2s;}
        .audio-btn:hover { opacity: 1; }
        
        .delete-row-btn { background: transparent; color: var(--text-secondary); border: none; font-size: 1.2rem; cursor: pointer; transition: all 0.2s; }
        .delete-row-btn:hover { color: var(--danger-color); }

        /* Active Recall Blur */
        .recall-active .blur-target { filter: blur(6px); transition: filter 0.3s; cursor: pointer; user-select: none; }
        .recall-active .blur-target.revealed { filter: blur(0px); }

        #unotesView { padding: 0; scroll-snap-type: y mandatory; position: relative; }
        .unote-slide {
            height: 100%; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 2rem; position: relative;
        }
        .unote-text {
            font-family: var(--font-serif); font-size: 1.8rem; color: var(--text-primary); text-align: center;
            max-width: 800px; line-height: 1.7; white-space: pre-wrap; font-style: italic; letter-spacing: 0.5px;
            z-index: 10; /* Keep text below delete button */
        }
        .unote-meta {
            margin-top: 1.5rem; font-size: 1rem; color: var(--accent-color); font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
            z-index: 10;
        }
        .fab-btn {
            position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent-color); color: #FFF; font-size: 32px; display: flex; align-items: center; justify-content: center;
            border: none; box-shadow: var(--shadow-sm); cursor: pointer; z-index: 1000; transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .fab-btn:hover { background: var(--accent-hover); transform: scale(1.05); box-shadow: var(--shadow-lg); }
        .fab-btn:active { transform: scale(0.95); }
        textarea.modal-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-primary); outline: none; resize: vertical; font-family: var(--font-sans); }
        
        .delete-unote-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.05); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; backdrop-filter: blur(4px); transition: all 0.2s; z-index: 9999; pointer-events: auto; /* Fixed: High Z-index and larger touch target */
        }
        .dark-mode .delete-unote-btn { background: rgba(255,255,255,0.05); }
        .delete-unote-btn:hover { background: var(--danger-color); color: white; border-color: var(--danger-color); transform: scale(1.1); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: var(--container-bg); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center; padding: 0 10%; z-index: 1000;
        }
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-secondary);
            cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: color 0.2s; border: none; background: transparent;
        }
        .nav-tab svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-tab.active { color: var(--accent-color); }
        
        .version-tag { position: absolute; bottom: 70px; right: 10px; font-size: 0.65rem; color: var(--text-secondary); }

        /* Modals */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content { background: var(--container-bg); padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: var(--shadow-sm); }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-color); color: var(--text-primary);}

        /* Mobile Responsiveness for Tiles */
        @media (max-width: 600px) {
            .app-view { padding: 1rem; }
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 1rem; }
            .book-cover { height: 150px; margin-bottom: 8px; }
            .book-info h3 { font-size: 1rem; }
            .nav-title { font-size: 1.5rem; }
            .creation-area { flex-direction: column; }
            .drop-zone { min-width: 100%; }
        }
        
        /* Flashcard Styles */
        .flashcard-body { cursor: pointer; padding: 20px 0; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="manualAddModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top:0; font-family:var(--font-serif);">Add Word Manually</h2>
        <input type="text" id="manWord" placeholder="Word (Required)">
        <input type="text" id="manHindi" placeholder="Hindi Meaning">
        <input type="text" id="manSyn" placeholder="Similar Words">
        <input type="text" id="manMeaning" placeholder="Definition">
        <input type="text" id="manUsage" placeholder="Usage">
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
            <button class="pill-btn" onclick="document.getElementById('manualAddModal').style.display='none'">Cancel</button>
            <button class="action-btn" onclick="saveManualWord()">Save</button>
        </div>
    </div>
</div>

<!-- Practice / Flashcard Modal -->
<div id="practiceModal" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <span style="color:var(--text-secondary); font-size: 0.85rem; font-weight: 600;" id="fcProgress">Card 1 / 10</span>
            <button class="pill-btn" onclick="closePractice()">✕ Quit</button>
        </div>
        
        <div class="flashcard-body" onclick="flipCard()">
            <h2 id="fcWord" style="margin: 0; font-size: 2.2rem; font-family:var(--font-serif); color:var(--text-primary); text-align: center;">Word</h2>
            <p id="fcHint" style="color:var(--text-secondary); font-size: 0.85rem; margin-top: 15px;">(Tap card to flip)</p>
            
            <div id="flashcardBack" style="display:none; margin-top: 20px; width: 100%; border-top: 1px solid var(--border-color); padding-top: 15px; text-align: left;">
                <p style="margin: 5px 0; font-size: 0.95rem;"><strong>Hindi:</strong> <span id="fcHindi" style="color:var(--text-secondary);"></span></p>
                <p style="margin: 5px 0; font-size: 0.95rem;"><strong>Similar:</strong> <span id="fcSyn" style="color:var(--text-secondary);"></span></p>
                <p style="margin: 5px 0; font-size: 0.95rem;"><strong>Definition:</strong> <span id="fcMeaning" style="color:var(--text-primary);"></span></p>
                <p style="margin: 5px 0; font-size: 0.95rem;"><strong>Context:</strong> <em id="fcUsage" style="color:var(--text-secondary);"></em></p>
            </div>
        </div>
        
        <button class="action-btn" id="fcNextBtn" onclick="nextCard(event)" style="display:none; width: 100%; margin-top: 15px;">Next Card ➔</button>
    </div>
</div>

<div id="addUNoteModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top:0; font-family:var(--font-serif);">New Note</h2>
        <textarea id="unoteText" rows="5" class="modal-input" placeholder="Write your poem, phrase or key takeaway here (Required)"></textarea>
        <input type="text" id="unoteBook" placeholder="Book / Source (Optional)">
        <input type="text" id="unoteAuthor" placeholder="Author / Poet (Optional)">
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:10px;">
            <button class="pill-btn" onclick="closeUNoteModal()">Cancel</button>
            <button class="action-btn" onclick="saveUNote()">Save to Canvas</button>
        </div>
    </div>
</div>

<div class="app-container">
    
    <!-- View 1: Main Library / Dashboard -->
    <div id="libraryView" class="app-view active">
        <div class="nav-bar">
            <h2 class="nav-title">My Library</h2>
            <div class="nav-actions">
                <button class="pill-btn" onclick="toggleTheme()" id="themeBtn">🎨 Theme</button>
                <button id="installBtn" class="pill-btn" style="display:none;" onclick="installPWA()">⬇️ Install App</button>
            </div>
        </div>

        <div id="dashboardSection">
            <div class="creation-area">
                <input type="text" id="newBookInput" placeholder="New notebook name...">
                <button class="action-btn" onclick="createNewBook()">Create</button>
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFileInput').click()">
                    <span>📁 Drag & Drop CSV Database</span>
                    <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="handleCSVSelect(event)">
                </div>
            </div>
            <div class="book-grid" id="bookGrid"></div>
        </div>

        <div id="dictionarySection" style="display:none;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <button class="pill-btn" onclick="closeBook()">← Back</button>
                <div style="display:flex; gap:10px; flex-wrap: wrap; justify-content: flex-end;">
                    <button class="pill-btn" onclick="startPractice()" id="practiceBtn">🧠 Practice</button>
                    <button class="pill-btn" onclick="toggleActiveRecall()" id="recallBtn">👁️ Focus Mode</button>
                    <button class="pill-btn" onclick="exportToExcel()">📥 Export</button>
                </div>
            </div>
            
            <h1 id="currentBookTitle" style="font-family:var(--font-serif); font-size:2.5rem; margin:0 0 20px 0;">Book Name</h1>
            
            <div class="creation-area">
                <input type="text" id="wordInput" placeholder="Look up a difficult word...">
                <button class="action-btn" id="searchBtn" onclick="fetchWordDetails()">Search APIs</button>
                <button class="action-btn" style="background:transparent; color:var(--text-primary); border:1px solid var(--border-color);" onclick="document.getElementById('manualAddModal').style.display='flex'">+ Custom</button>
            </div>

            <div class="table-wrapper">
                <table id="wordTable">
                    <thead>
                        <tr>
                            <th style="width: 5%;">#</th>
                            <th style="width: 15%;">Word</th>
                            <th style="width: 15%;">Hindi</th>
                            <th style="width: 15%;">Similar</th>
                            <th style="width: 25%;">Definition</th>
                            <th style="width: 20%;">Context</th>
                            <th style="width: 5%;"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- View 2: UNotes (Reels-style Notes) -->
    <div id="unotesView" class="app-view">
        <button class="fab-btn" onclick="openUNoteModal()">+</button>
        <!-- Dynamic UNote Slides will be appended here -->
    </div>

</div>

<!-- Small Version Tag -->
<div class="version-tag">v4.0.2</div>

<div class="bottom-nav">
    <button class="nav-tab active" onclick="switchTab('library')" id="tab-library">
        <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
        Library
    </button>
    <button class="nav-tab" onclick="switchTab('unotes')" id="tab-unotes">
        <!-- Reverted to the Quotation Icon -->
        <svg viewBox="0 0 24 24"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
        UNotes
    </button>
</div>

<script>
    // --- PWA LOGIC ---
    let deferredPrompt;
    function setupPWA() {
        const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
                <rect width="512" height="512" fill="#7C3AED" rx="100"/>
                <text x="50%" y="54%" font-family="'Times New Roman', Times, serif" font-size="380" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">V</text>
            </svg>
        `;
        const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            const pngUrl = canvas.toDataURL('image/png');
            document.head.insertAdjacentHTML('beforeend', `<link rel="icon" type="image/png" href="${pngUrl}"><link rel="apple-touch-icon" href="${pngUrl}">`);
            const manifest = { name: "Vocab Tracker", short_name: "Vocab", display: "standalone", background_color: "#F9F8F6", theme_color: "#7C3AED", icons: [{ src: pngUrl, sizes: "512x512", type: "image/png" }] };
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'}))}">`);
        };
        img.src = url;
        window.addEventListener('beforeinstallprompt', (e) => { 
            e.preventDefault(); 
            deferredPrompt = e; 
            const btn = document.getElementById('installBtn'); 
            if(btn) btn.style.display = 'flex'; 
        });
    }
    
    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((c) => {
                if (c.outcome === 'accepted') {
                    const btn = document.getElementById('installBtn');
                    if(btn) btn.style.display = 'none';
                }
                deferredPrompt = null;
            });
        }
    }

    // --- STATE MANAGEMENT ---
    let libraryData = {}; 
    let libraryCovers = {}; 
    let bookOrder = []; 
    let currentBook = null;
    let isActiveRecall = false;

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        setupPWA(); loadTheme(); loadData(); loadUNotes(); renderDashboard(); renderUNotes();
        setupDragAndDrop();
    });

    // Handle clicking outside to close kebab menus
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.kebab-container')) {
            document.querySelectorAll('.dropdown-menu.active').forEach(m => m.classList.remove('active'));
        }
    });

    // --- STREAMING_CHUNK: Adding tab switching and theme management logic... ---
    // --- TAB SWITCHING LOGIC ---
    function switchTab(tabName) {
        document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        
        document.getElementById(`${tabName}View`).classList.add('active');
        document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    // --- THEME MANAGEMENT (3-State) ---
    const themes = ['light', 'warm', 'dark'];
    let currentThemeIndex = 0;

    function toggleTheme() {
        currentThemeIndex = (currentThemeIndex + 1) % themes.length;
        applyTheme(themes[currentThemeIndex]);
    }

    function applyTheme(themeName) {
        document.body.classList.remove('warm-mode', 'dark-mode');
        let themeColor = '#FFFFFF';
        
        if (themeName === 'warm') { document.body.classList.add('warm-mode'); themeColor = '#FDF6E3'; }
        if (themeName === 'dark') { document.body.classList.add('dark-mode'); themeColor = '#121212'; }
        
        document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColor);
        try { localStorage.setItem('themePref_v4', themeName); } catch(e) {}
    }

    function loadTheme() {
        try {
            const savedTheme = localStorage.getItem('themePref_v4') || 'light';
            currentThemeIndex = themes.indexOf(savedTheme);
            applyTheme(savedTheme);
        } catch(e) {}
    }

    // --- DATA MANAGEMENT ---
    function loadData() {
        try {
            const savedLib = localStorage.getItem('vocab_Library_v4') || localStorage.getItem('academicDict_Library');
            if (savedLib) libraryData = JSON.parse(savedLib);
            const savedCov = localStorage.getItem('vocab_Covers_v4') || localStorage.getItem('academicDict_Covers');
            if (savedCov) libraryCovers = JSON.parse(savedCov);
            const savedOrder = localStorage.getItem('vocab_Order_v4') || localStorage.getItem('academicDict_Order');
            if (savedOrder) bookOrder = JSON.parse(savedOrder);

            Object.keys(libraryData).forEach(b => { if(!bookOrder.includes(b)) bookOrder.push(b); });
            bookOrder = bookOrder.filter(b => libraryData[b]);
        } catch (e) {}
    }

    function saveData() {
        try {
            localStorage.setItem('vocab_Library_v4', JSON.stringify(libraryData));
            localStorage.setItem('vocab_Covers_v4', JSON.stringify(libraryCovers));
            localStorage.setItem('vocab_Order_v4', JSON.stringify(bookOrder));
        } catch (e) {}
    }

    // --- AUDIO (TTS) ---
    function speakWord(word) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }
    }

    // --- STREAMING_CHUNK: Implementing Active Recall and Flashcard features... ---
    // --- ACTIVE RECALL ---
    function toggleActiveRecall() {
        isActiveRecall = !isActiveRecall;
        const btn = document.getElementById('recallBtn');
        const table = document.getElementById('wordTable');
        
        if (isActiveRecall) {
            btn.style.backgroundColor = "var(--accent-color)"; btn.style.color = "#FFF";
            table.classList.add('recall-active');
        } else {
            btn.style.backgroundColor = "transparent"; btn.style.color = "var(--text-primary)";
            table.classList.remove('recall-active');
            // Remove revealed state from all cells
            document.querySelectorAll('.blur-target.revealed').forEach(el => el.classList.remove('revealed'));
        }
    }

    function revealCell(element) {
        if(isActiveRecall) { element.classList.toggle('revealed'); }
    }

    // --- PRACTICE / FLASHCARD MODE ---
    let practiceCards = [];
    let practiceIndex = 0;

    function startPractice() {
        const data = libraryData[currentBook];
        if (!data || data.length === 0) return alert("This notebook is empty! Add some words first.");
        
        // Shuffle cards to randomize the test
        practiceCards = [...data].sort(() => Math.random() - 0.5);
        practiceIndex = 0;
        
        document.getElementById('practiceModal').style.display = 'flex';
        showCard();
    }

    function showCard() {
        if (practiceIndex >= practiceCards.length) {
            alert("Great job! You've reviewed all the cards in this notebook.");
            closePractice();
            return;
        }
        const card = practiceCards[practiceIndex];
        document.getElementById('fcWord').innerText = card.word;
        document.getElementById('fcHindi').innerText = card.hindi || "-";
        document.getElementById('fcSyn').innerText = card.synonyms || "-";
        document.getElementById('fcMeaning').innerText = card.meaning;
        document.getElementById('fcUsage').innerText = card.usage !== "-" ? `"${card.usage}"` : "-";
        
        document.getElementById('fcProgress').innerText = `Card ${practiceIndex + 1} / ${practiceCards.length}`;
        document.getElementById('flashcardBack').style.display = 'none';
        document.getElementById('fcHint').style.display = 'block';
        document.getElementById('fcNextBtn').style.display = 'none';
    }

    function flipCard() {
        if (document.getElementById('flashcardBack').style.display === 'none') {
            document.getElementById('flashcardBack').style.display = 'block';
            document.getElementById('fcHint').style.display = 'none';
            document.getElementById('fcNextBtn').style.display = 'block';
        }
    }

    window.nextCard = function(e) {
        if(e) e.stopPropagation(); // Prevent card flip when clicking 'next'
        practiceIndex++;
        showCard();
    };

    window.closePractice = function() {
        document.getElementById('practiceModal').style.display = 'none';
    };

    // --- STREAMING_CHUNK: Library Dashboard & Reordering Logic... ---
    let draggedBook = null;
    
    function renderDashboard() {
        const grid = document.getElementById('bookGrid'); grid.innerHTML = '';
        bookOrder.forEach((bookName, i) => {
            const count = libraryData[bookName].length;
            const cover = libraryCovers[bookName] ? `url(${libraryCovers[bookName]})` : 'var(--default-cover)';
            const card = document.createElement('div'); card.className = 'book-card';
            card.draggable = true;
            
            card.addEventListener('dragstart', function(e) { if(e.target.closest('.kebab-container')) { e.preventDefault(); return; } draggedBook = bookName; this.style.opacity = '0.4'; });
            card.addEventListener('dragend', function(e) { this.style.opacity = '1'; });
            card.addEventListener('dragover', e => e.preventDefault());
            card.addEventListener('drop', function(e) {
                e.preventDefault();
                if(draggedBook && draggedBook !== bookName) {
                    const from = bookOrder.indexOf(draggedBook);
                    const to = bookOrder.indexOf(bookName);
                    bookOrder.splice(from, 1); bookOrder.splice(to, 0, draggedBook);
                    saveData(); renderDashboard();
                }
            });

            card.onclick = (e) => { if(!e.target.closest('.kebab-container')) openBook(bookName); };
            
            const safeName = bookName.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            card.innerHTML = `
                <div class="kebab-container">
                    <button class="kebab-btn" onclick="toggleMenu(event, ${i})">&#8942;</button>
                    <div class="dropdown-menu" id="dropdown-${i}">
                        <button class="dropdown-item" onclick="menuAction(event, 'cover', '${safeName}')">📁 Change Cover</button>
                        <button class="dropdown-item danger" onclick="menuAction(event, 'delete', '${safeName}')">🗑️ Delete</button>
                    </div>
                </div>
                <div class="book-cover" style="background-image: ${cover};"></div>
                <div class="book-info"><h3>${bookName}</h3><p>${count} words</p></div>
            `;
            grid.appendChild(card);
        });
    }

    window.toggleMenu = function(e, i) {
        e.preventDefault(); e.stopPropagation();
        const m = document.getElementById(`dropdown-${i}`); const active = m.classList.contains('active');
        document.querySelectorAll('.dropdown-menu').forEach(x => x.classList.remove('active'));
        if(!active) m.classList.add('active');
    };
    
    window.menuAction = function(e, action, name) {
        e.preventDefault(); e.stopPropagation(); document.querySelectorAll('.dropdown-menu').forEach(x => x.classList.remove('active'));
        if(action === 'cover') triggerImageUpload(name);
        if(action === 'delete') deleteBook(name);
    };

    function triggerImageUpload(bookName) {
        const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            if (!e.target.files[0]) return;
            const r = new FileReader(); r.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); let w = img.width, h = img.height;
                    if(w>h) { if(w>300){h*=300/w; w=300;} } else { if(h>400){w*=400/h; h=400;} }
                    canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
                    libraryCovers[bookName] = canvas.toDataURL('image/jpeg', 0.8); saveData(); renderDashboard();
                }; img.src = ev.target.result;
            }; r.readAsDataURL(e.target.files[0]);
        }; input.click();
    }

    function createNewBook() {
        let name = document.getElementById('newBookInput').value.trim();
        if(!name) return; if(libraryData[name]) return alert("Exists!");
        libraryData[name] = []; bookOrder.push(name); saveData(); document.getElementById('newBookInput').value=''; renderDashboard();
    }

    function deleteBook(name) {
        if(confirm(`Delete "${name}"?`)){ delete libraryData[name]; delete libraryCovers[name]; bookOrder=bookOrder.filter(b=>b!==name); saveData(); renderDashboard(); }
    }

    // --- STREAMING_CHUNK: Implementing Drag and Drop for CSV files... ---
    // --- DRAG & DROP CSV ---
    function setupDragAndDrop() {
        const dz = document.getElementById('dropZone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
        dz.addEventListener('dragleave', e => { e.preventDefault(); dz.classList.remove('drag-over'); });
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); if(e.dataTransfer.files[0]) processCSV(e.dataTransfer.files[0]); });
    }
    function handleCSVSelect(e) { if(e.target.files[0]) processCSV(e.target.files[0]); e.target.value=''; }

    function processCSV(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n'); if(lines.length<2) return;
            let name = file.name.replace('.csv',''); let orig=name, c=1;
            while(libraryData[name]) { name=`${orig} (${c++})`; }
            libraryData[name] = []; bookOrder.push(name);
            for(let i=1; i<lines.length; i++) {
                if(!lines[i].trim()) continue;
                const m = [...lines[i].matchAll(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)].map(x=>x[1].replace(/(^"|"$)/g,''));
                if(m.length>=5) libraryData[name].push({ word: m[1]||"-", hindi: m[2]||"-", synonyms: m[3]||"-", meaning: m[4]||"-", usage: m[5]||"-" });
            }
            saveData(); renderDashboard();
        }; reader.readAsText(file);
    }

    // --- STREAMING_CHUNK: Managing Dictionary API and rendering tables... ---
    // --- BOOK VIEW & DOUBLE API SEARCH ---
    function openBook(name) {
        currentBook = name; document.getElementById('currentBookTitle').innerText = name;
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('dictionarySection').style.display = 'block';
        renderTable();
    }
    function closeBook() {
        document.getElementById('dictionarySection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        currentBook = null; renderDashboard();
    }

    async function fetchWordDetails() {
        const input = document.getElementById('wordInput'); const btn = document.getElementById('searchBtn');
        const word = input.value.trim().toLowerCase(); if(!word) return;
        if(libraryData[currentBook].some(e=>e.word.toLowerCase()===word)) return alert("Already saved.");
        
        btn.innerText = "⏳..."; btn.disabled = true;
        try {
            // FreeDict API
            const dRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if(!dRes.ok) throw new Error(); const dData = await dRes.json();
            let mean="-", use="-";
            if(dData[0] && dData[0].meanings) {
                mean = dData[0].meanings[0].definitions[0]?.definition || "-";
                for(let m of dData[0].meanings) { for(let d of m.definitions) { if(d.example && use==="-") { use=d.example; break; } } }
            }
            
            // Datamuse API (Synonyms)
            let syn="-";
            try { const sRes = await fetch(`https://api.datamuse.com/words?rel_syn=${word}&max=3`); const sData = await sRes.json(); if(sData.length>0) syn=sData.map(x=>x.word).join(", "); } catch(e){}

            // MyMemory (Hindi)
            let hi="-";
            try { const hRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|hi`); const hData = await hRes.json(); if(hData.responseData.translatedText.toLowerCase() !== word) hi=hData.responseData.translatedText; } catch(e){}

            libraryData[currentBook].push({word, hindi:hi, synonyms:syn, meaning:mean, usage:use});
            saveData(); renderTable(); input.value='';
        } catch(e) { alert("Word not found."); } finally { btn.innerText="Search APIs"; btn.disabled=false; }
    }

    function saveManualWord() {
        const w = document.getElementById('manWord').value.trim(); if(!w) return;
        libraryData[currentBook].push({ word: w, hindi: document.getElementById('manHindi').value||"-", synonyms: document.getElementById('manSyn').value||"-", meaning: document.getElementById('manMeaning').value||"-", usage: document.getElementById('manUsage').value||"-" });
        saveData(); renderTable(); document.getElementById('manualAddModal').style.display='none';
    }

    window.deleteRow = function(i) { if(confirm("Remove word?")) { libraryData[currentBook].splice(i,1); saveData(); renderTable(); } };

    function renderTable() {
        const tb = document.getElementById('tableBody'); tb.innerHTML='';
        const data = libraryData[currentBook];
        if(data.length===0) { tb.innerHTML='<tr><td colspan="7" style="text-align:center; padding:40px;">No words.</td></tr>'; return; }
        
        data.forEach((e,i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i+1}</td>
                <td><div class="td-word"><button class="audio-btn" onclick="speakWord('${e.word.replace(/'/g,"\\'")}')">🔊</button>${e.word}</div></td>
                <td><div class="blur-target td-hindi" onclick="revealCell(this)">${e.hindi}</div></td>
                <td><div class="blur-target td-syn" onclick="revealCell(this)">${e.synonyms}</div></td>
                <td><div class="blur-target td-meaning" onclick="revealCell(this)">${e.meaning}</div></td>
                <td><div class="blur-target td-use" onclick="revealCell(this)">${e.usage!=="-" ? `"${e.usage}"` : "-"}</div></td>
                <td><button class="delete-row-btn" onclick="deleteRow(${i})">✕</button></td>
            `;
            tb.appendChild(tr);
        });
    }

    function exportToExcel() {
        const cData = libraryData[currentBook]; if (!cData || cData.length === 0) return alert("Notebook is empty.");
        let csv = "Sr No.,Word,Hindi,Similar Words,Definition,Context\n";
        cData.forEach((e, i) => { 
            let w = e.word.replace(/"/g, '""'); let h = (e.hindi||"-").replace(/"/g, '""'); let s = (e.synonyms||"-").replace(/"/g, '""');
            let m = e.meaning.replace(/"/g, '""'); let u = e.usage.replace(/"/g, '""'); 
            csv += `${i + 1},"${w}","${h}","${s}","${m}","${u}"\n`; 
        });
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `${currentBook.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_glossary.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    // --- STREAMING_CHUNK: Managing UNotes data and rendering... ---
    // --- UNOTES LOGIC ---
    let unotesData = [];

    function loadUNotes() {
        try {
            const saved = localStorage.getItem('unotesData_v1');
            if (saved) unotesData = JSON.parse(saved);
        } catch(e) {}
    }

    function saveUNotes() {
        try { localStorage.setItem('unotesData_v1', JSON.stringify(unotesData)); } catch(e) {}
    }

    window.renderUNotes = function() {
        const view = document.getElementById('unotesView');
        // Clear view but retain the FAB button
        view.innerHTML = '<button class="fab-btn" onclick="openUNoteModal()">+</button>';
        
        if (unotesData.length === 0) {
            view.innerHTML += `
                <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); text-align: center; padding: 2rem;">
                    <svg viewBox="0 0 24 24" style="width:72px;height:72px;fill:currentColor;margin-bottom:1rem;opacity:0.4;"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
                    <h3 style="margin-bottom:0.5rem; font-family: var(--font-serif); font-size: 1.5rem; color:var(--text-primary);">Your Canvas is Empty</h3>
                    <p>Tap the + button to save your first key takeaway, quote, or note.</p>
                </div>
            `;
            return;
        }

        unotesData.forEach((note, index) => {
            const slide = document.createElement('div');
            slide.className = 'unote-slide';
            // Sanitize text for rendering
            const safeText = note.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            slide.innerHTML = `
                <button class="delete-unote-btn" onclick="event.stopPropagation(); deleteUNote(${index})" title="Delete Note">✕</button>
                <div class="unote-text">"${safeText}"</div>
                ${note.author || note.book ? `
                    <div class="unote-meta">
                        ${note.author ? `— ${note.author}` : ''}
                    </div>
                    <div style="margin-top: 8px; font-size: 0.9rem; color: var(--text-secondary); font-style: italic; text-align: center; max-width: 80%;">
                        ${note.book ? `from "${note.book}"` : ''}
                    </div>
                ` : ''}
            `;
            view.appendChild(slide);
        });
    }

    window.openUNoteModal = function() { document.getElementById('addUNoteModal').style.display = 'flex'; }
    window.closeUNoteModal = function() { 
        document.getElementById('addUNoteModal').style.display = 'none'; 
        document.getElementById('unoteText').value = '';
        document.getElementById('unoteBook').value = '';
        document.getElementById('unoteAuthor').value = '';
    }
    
    window.saveUNote = function() {
        const text = document.getElementById('unoteText').value.trim();
        if(!text) return alert("Note text is required!");
        
        const book = document.getElementById('unoteBook').value.trim();
        const author = document.getElementById('unoteAuthor').value.trim();
        
        // Unshift pushes the newest note to the top of the reel
        unotesData.unshift({ text, book, author, date: Date.now() });
        saveUNotes();
        renderUNotes();
        closeUNoteModal();
    }

    window.deleteUNote = function(index) {
        if(confirm("Are you sure you want to permanently delete this note?")) {
            unotesData.splice(index, 1);
            saveUNotes();
            renderUNotes();
        }
    }
</script>
