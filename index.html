<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vocab Tracker">
    <title>Book Vocab Tracker</title>
    
    <style>
        /* CSS Variables for Premium Light/Dark Mode */
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #ffffff;
            --text-color: #1f2937;
            --muted-text: #6b7280;
            --border-color: #e5e7eb;
            
            --primary-btn: #2563eb; 
            --primary-hover: #1d4ed8;
            --danger-btn: #ef4444;
            --success-btn: #10b981;
            --success-hover: #059669;
            
            --table-head-bg: linear-gradient(135deg, #1e293b, #334155);
            --table-head-text: #f8fafc;
            --table-row-even: #f8fafc;
            --table-row-odd: #ffffff;
            --table-border: #e2e8f0;
            --table-hover: #f1f5f9;
            
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --card-hover: #f9fafb;
            --default-cover: linear-gradient(135deg, #cbd5e1, #94a3b8);
        }

        .dark-mode {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f1f5f9;
            --muted-text: #94a3b8;
            --border-color: #334155;
            
            --primary-btn: #3b82f6; 
            --primary-hover: #60a5fa;
            
            --table-head-bg: linear-gradient(135deg, #020617, #172554);
            --table-head-text: #e2e8f0;
            --table-row-even: #0f172a;
            --table-row-odd: #1e293b;
            --table-border: #334155;
            --table-hover: #172554;

            --card-bg: #1e293b;
            --card-border: #334155;
            --card-hover: #2dd4bf0d;
            --default-cover: linear-gradient(135deg, #334155, #1e293b);
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
            /* Prevents pull-to-refresh issue on some mobile browsers */
            overscroll-behavior-y: none; 
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: background-color 0.3s;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-title { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .nav-actions { display: flex; gap: 10px; }
        
        .theme-toggle, .install-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .theme-toggle:hover, .install-btn:hover { background: var(--border-color); }
        .install-btn { border-color: var(--primary-btn); color: var(--primary-btn); }

        .view { display: none; }
        .view.active { display: block; }

        .create-book-section {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        .book-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .book-cover {
            height: 160px;
            background: var(--default-cover);
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .book-info { padding: 1.25rem 1rem; background: var(--card-bg); }
        .book-card h3 { margin: 0 0 8px 0; color: var(--primary-btn); font-size: 1.1rem; word-wrap: break-word;}
        .book-card p { margin: 0; font-size: 0.85rem; color: var(--muted-text); }
        
        .delete-book-btn {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0, 0, 0, 0.35); color: rgba(255, 255, 255, 0.8);
            border: none; border-radius: 50%; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px; font-weight: bold; line-height: 1;
            backdrop-filter: blur(2px); transition: all 0.2s ease;
        }
        .delete-book-btn:hover { 
            transform: scale(1.1); background: var(--danger-btn); color: white;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
        }

        .add-cover-btn {
            position: absolute;
            bottom: 10px; right: 10px;
            background: rgba(0, 0, 0, 0.6); color: white;
            border: none; border-radius: 6px; padding: 4px 8px; font-size: 0.75rem;
            cursor: pointer; backdrop-filter: blur(4px); transition: background 0.2s;
        }
        .add-cover-btn:hover { background: rgba(0, 0, 0, 0.8); }

        /* Dictionary View Styles */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
        .back-btn { background-color: transparent; color: var(--muted-text); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 6px; cursor: pointer;}
        .back-btn:hover { background-color: var(--border-color); color: var(--text-color); }
        
        input[type="text"] {
            flex: 1; padding: 12px 16px; font-size: 1rem; border: 1px solid var(--border-color);
            border-radius: 8px; background: var(--bg-color); color: var(--text-color); outline: none;
            /* Prevents zooming on iOS */
            font-size: 16px; 
        }
        input[type="text"]:focus { border-color: var(--primary-btn); }
        
        button.action-btn {
            padding: 12px 20px; font-size: 0.95rem; font-weight: 600; background-color: var(--primary-btn);
            color: white; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
        }
        button.action-btn:hover { opacity: 0.9; }
        button.action-btn:active { transform: scale(0.98); }
        button.action-btn:disabled { background-color: var(--muted-text); cursor: not-allowed; transform: none; }
        
        .export-btn { background-color: var(--success-btn); padding: 8px 16px; font-size: 0.85rem; color: white; border: none; border-radius: 6px; cursor: pointer;}
        .export-btn:hover { background-color: var(--success-hover); }
        
        .error-message { color: var(--danger-btn); font-size: 0.9rem; margin-bottom: 15px; display: none; }
        
        .table-wrapper { 
            overflow-x: auto; border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--table-border);
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; background: var(--container-bg); }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--table-border); line-height: 1.5; }
        th {
            background: var(--table-head-bg); color: var(--table-head-text);
            font-weight: 600; font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase;
        }
        tr:nth-child(even) { background-color: var(--table-row-even); }
        tr:nth-child(odd) { background-color: var(--table-row-odd); }
        tr:hover { background-color: var(--table-hover); transition: background-color 0.2s;}
        
        .flex-row { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <h2 class="nav-title">📚 My Library</h2>
        <div class="nav-actions">
            <button id="installBtn" class="install-btn" style="display:none;" onclick="installPWA()">⬇️ Install App</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
        </div>
    </div>

    <div id="dashboardView" class="view active">
        <p style="color: var(--muted-text); margin-top: -10px; margin-bottom: 20px;">Create a dataframe for the book you are reading.</p>
        <div class="create-book-section">
            <input type="text" id="newBookInput" placeholder="Enter book name...">
            <button class="action-btn" onclick="createNewBook()">Create</button>
        </div>
        <div class="book-grid" id="bookGrid">
            </div>
    </div>

    <div id="dictionaryView" class="view">
        <div class="header-container">
            <div><button class="back-btn" onclick="showDashboard()">← Back</button></div>
            <h2 id="currentBookTitle" style="margin: 0; font-size: 1.25rem;">Book Name</h2>
            <button class="export-btn" onclick="exportToExcel()">Export to Excel</button>
        </div>
        
        <div class="flex-row">
            <input type="text" id="wordInput" placeholder="Look up a difficult word...">
            <button class="action-btn" id="searchBtn" onclick="fetchWordDetails()">Search</button>
        </div>
        
        <div id="errorMsg" class="error-message">Word not found or API is offline. Please check spelling.</div>

        <div class="table-wrapper">
            <table id="wordTable">
                <thead>
                    <tr>
                        <th style="width: 8%;">No.</th>
                        <th style="width: 17%;">Word</th>
                        <th style="width: 35%;">Meaning</th>
                        <th style="width: 40%;">Its use</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- PWA AND DYNAMIC ICON INJECTION ---
    let deferredPrompt;

    function setupPWA() {
        // 1. Create the SVG of the Times New Roman "W"
        const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
                <rect width="512" height="512" fill="#2563eb" rx="100"/>
                <text x="50%" y="54%" font-family="'Times New Roman', Times, serif" font-size="380" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">W</text>
            </svg>
        `;
        
        // 2. Convert SVG to Image, then to PNG Canvas for best OS compatibility
        const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const svgUrl = URL.createObjectURL(svgBlob);
        
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            const pngDataUrl = canvas.toDataURL('image/png');
            
            // 3. Inject Apple Touch Icon and standard Favicon
            document.head.insertAdjacentHTML('beforeend', `
                <link rel="icon" type="image/png" href="${pngDataUrl}">
                <link rel="apple-touch-icon" href="${pngDataUrl}">
            `);

            // 4. Inject Dynamic PWA Manifest
            const manifest = {
                name: "Book Vocab Tracker",
                short_name: "Vocab",
                description: "Track difficult words while reading.",
                start_url: window.location.href.split('?')[0],
                display: "standalone",
                background_color: "#f3f4f6",
                theme_color: "#2563eb",
                icons: [{ src: pngDataUrl, sizes: "512x512", type: "image/png" }]
            };
            
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
            const manifestUrl = URL.createObjectURL(manifestBlob);
            
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestUrl}">`);
        };
        img.src = svgUrl;

        // Catch the native PWA install prompt event (Chrome/Edge/Android)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });
    }

    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            });
        }
    }

    // --- APP DATA LOGIC ---
    let libraryData = {}; 
    let libraryCovers = {}; 
    let currentBook = null;

    document.addEventListener('DOMContentLoaded', () => {
        setupPWA(); // Initialize Icon and Web App configuration
        loadTheme();
        loadData();
        renderDashboard();
    });

    function loadData() {
        const savedLibrary = localStorage.getItem('multiDictApp_Library');
        if (savedLibrary) { libraryData = JSON.parse(savedLibrary); } 
        else {
            const oldData = localStorage.getItem('myDictionaryApp_Data');
            if (oldData) { libraryData["Migrated Words"] = JSON.parse(oldData); localStorage.removeItem('myDictionaryApp_Data'); }
        }

        const savedCovers = localStorage.getItem('multiDictApp_Covers');
        if (savedCovers) { libraryCovers = JSON.parse(savedCovers); }
        saveData(); 
    }

    function saveData() {
        localStorage.setItem('multiDictApp_Library', JSON.stringify(libraryData));
        localStorage.setItem('multiDictApp_Covers', JSON.stringify(libraryCovers));
    }

    function renderDashboard() {
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = '';
        const books = Object.keys(libraryData);
        
        if (books.length === 0) {
            grid.innerHTML = '<p style="color: var(--muted-text); grid-column: 1 / -1;">No books yet. Create one above!</p>';
            return;
        }

        books.forEach(bookName => {
            const wordCount = libraryData[bookName].length;
            const coverImage = libraryCovers[bookName] ? `url(${libraryCovers[bookName]})` : 'var(--default-cover)';
            
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openBook(bookName);
            
            card.innerHTML = `
                <div class="book-cover" style="background-image: ${coverImage};">
                    <button class="delete-book-btn" onclick="deleteBook(event, '${bookName}')" title="Delete Book">✕</button>
                    <button class="add-cover-btn" onclick="triggerImageUpload(event, '${bookName}')">🖼️ Cover</button>
                </div>
                <div class="book-info">
                    <h3>${bookName}</h3>
                    <p>${wordCount} word${wordCount !== 1 ? 's' : ''}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function triggerImageUpload(event, bookName) {
        event.stopPropagation(); 
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 300; 
                    const MAX_HEIGHT = 450;
                    let width = img.width; let height = img.height;

                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }

                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    libraryCovers[bookName] = dataUrl;
                    saveData();
                    renderDashboard();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function createNewBook() {
        const input = document.getElementById('newBookInput');
        const bookName = input.value.trim();
        if (!bookName) return;
        if (libraryData[bookName]) return alert("A book with this name already exists!");

        libraryData[bookName] = [];
        saveData();
        input.value = '';
        renderDashboard();
    }

    function deleteBook(event, bookName) {
        event.stopPropagation(); 
        if (confirm(`Are you sure you want to delete "${bookName}"?`)) {
            delete libraryData[bookName];
            delete libraryCovers[bookName]; 
            saveData();
            renderDashboard();
        }
    }

    function showDashboard() {
        document.getElementById('dictionaryView').classList.remove('active');
        document.getElementById('dashboardView').classList.add('active');
        currentBook = null;
        renderDashboard(); 
    }

    function openBook(bookName) {
        currentBook = bookName;
        document.getElementById('currentBookTitle').innerText = bookName;
        document.getElementById('dashboardView').classList.remove('active');
        document.getElementById('dictionaryView').classList.add('active');
        renderTable();
    }

    document.getElementById("wordInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); fetchWordDetails(); }
    });

    document.getElementById("newBookInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); createNewBook(); }
    });

    async function fetchWordDetails() {
        const inputElement = document.getElementById('wordInput');
        const searchBtn = document.getElementById('searchBtn');
        const word = inputElement.value.trim().toLowerCase();
        const errorElement = document.getElementById('errorMsg');

        if (!word || !currentBook) return;
        errorElement.style.display = 'none';
        
        if (libraryData[currentBook].some(entry => entry.word === word)) {
            inputElement.value = '';
            alert(`"${word}" is already saved in this book.`);
            return;
        }

        searchBtn.innerText = "Searching..."; searchBtn.disabled = true;

        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if (!response.ok) throw new Error("Word not found");

            const data = await response.json();
            let meaning = "Meaning not available."; let usage = "Example not available.";

            if (data && data[0] && data[0].meanings && data[0].meanings.length > 0) {
                const firstMeaning = data[0].meanings[0];
                if (firstMeaning.definitions && firstMeaning.definitions.length > 0) { meaning = firstMeaning.definitions[0].definition; }

                for (let m of data[0].meanings) {
                    if (!m.definitions) continue;
                    for (let d of m.definitions) {
                        if (d.example) { usage = d.example; break; }
                    }
                    if (usage !== "Example not available.") break;
                }
            }

            libraryData[currentBook].push({ word, meaning, usage });
            saveData(); renderTable(); inputElement.value = '';

        } catch (error) { errorElement.style.display = 'block'; } 
        finally { searchBtn.innerText = "Search"; searchBtn.disabled = false; }
    }

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = ''; 
        const currentData = libraryData[currentBook];

        if (currentData.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--muted-text); padding: 30px;">No words saved in this book yet.</td></tr>';
            return;
        }

        currentData.forEach((entry, index) => {
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${index + 1}</td>
                <td><strong style="color: var(--primary-btn);">${entry.word}</strong></td>
                <td>${entry.meaning}</td>
                <td><em style="color: var(--muted-text);">${entry.usage}</em></td>
            `;
            tableBody.appendChild(newRow);
        });
    }

    function exportToExcel() {
        const currentData = libraryData[currentBook];
        if (!currentData || currentData.length === 0) { return alert("This book is empty. Nothing to export."); }

        let csvContent = "Sr No.,Word,Meaning,Its use\n";

        currentData.forEach((entry, index) => {
            let cleanMeaning = entry.meaning.replace(/"/g, '""');
            let cleanUsage = entry.usage.replace(/"/g, '""');
            csvContent += `${index + 1},"${entry.word}","${cleanMeaning}","${cleanUsage}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        const safeName = currentBook.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        
        link.setAttribute("href", url); link.setAttribute("download", `${safeName}_vocab.csv`);
        link.style.visibility = 'hidden'; document.body.appendChild(link);
        link.click(); document.body.removeChild(link);
    }

    function toggleTheme() {
        const body = document.body; const themeBtn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        
        if (body.classList.contains('dark-mode')) {
            localStorage.setItem('themePref', 'dark'); themeBtn.innerText = '☀️ Light Mode';
        } else {
            localStorage.setItem('themePref', 'light'); themeBtn.innerText = '🌙 Dark Mode';
        }
    }

    function loadTheme() {
        const pref = localStorage.getItem('themePref');
        const body = document.body; const themeBtn = document.getElementById('themeBtn');
        if (pref === 'dark') { body.classList.add('dark-mode'); themeBtn.innerText = '☀️ Light Mode'; }
    }
</script>

</body>
</html>
