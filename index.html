<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F4F1EA">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Vocab">
    <title>Vocab</title>
    
    <style>
        /* Visual Theory Variables: Paper & Slate Focus Theme */
        :root {
            --font-serif: 'Georgia', 'Times New Roman', serif;
            --font-sans: system-ui, -apple-system, sans-serif;

            /* Light/Paper Theme */
            --bg-color: #F4F1EA;          
            --container-bg: #FFFFFF;      
            --surface-hover: #FAF9F6;     
            
            --text-primary: #2B2B2B;      
            --text-secondary: #5C5C5C;    
            --border-color: #E2DDD3;      
            
            --accent-color: #2F5C43;      
            --accent-hover: #1E3F2D;      
            --danger-color: #B54646;      
            
            --card-bg: #FFFFFF;
            --card-border: #E2DDD3;
            --default-cover: linear-gradient(135deg, #D4CEBE, #E2DDD3);
            --shadow-sm: 0 2px 8px rgba(43, 43, 43, 0.04);
            --shadow-lg: 0 12px 24px rgba(43, 43, 43, 0.06);
        }

        .dark-mode {
            /* Dark/Slate Theme */
            --bg-color: #17181A;          
            --container-bg: #1F2124;
            --surface-hover: #26282B;
            
            --text-primary: #E0E2E5;      
            --text-secondary: #9BA1A6;
            --border-color: #31353A;
            
            --accent-color: #6B9AC4;      
            --accent-hover: #8AB4F8;      
            --danger-color: #D65C5C;
            
            --card-bg: #1F2124;
            --card-border: #31353A;
            --default-cover: linear-gradient(135deg, #31353A, #1F2124);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 12px 24px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: var(--font-sans); background-color: var(--bg-color);
            color: var(--text-primary); padding: 1.5rem; margin: 0; 
            display: flex; flex-direction: column; align-items: center;
            overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; line-height: 1.6;
        }
        
        #storageWarning {
            display: none; width: 100%; max-width: 1000px; background-color: var(--danger-color); color: white;
            padding: 12px 15px; border-radius: 6px; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; box-sizing: border-box;
        }

        .container {
            width: 100%; max-width: 1200px; background: var(--container-bg); padding: 2.5rem 3rem;
            border-radius: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);
            box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s;
        }
        
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--border-color); flex-wrap: wrap; gap: 15px; 
        }
        .nav-title { margin: 0; font-size: 2rem; font-weight: 400; font-family: var(--font-serif); color: var(--text-primary);}
        .nav-actions { display: flex; gap: 10px; }
        
        .focus-btn {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-primary);
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.9rem; 
            transition: all 0.2s ease; font-family: var(--font-sans);
        }
        .focus-btn:hover { border-color: var(--text-secondary); background: var(--surface-hover); }
        .install-btn { background: var(--text-primary); color: var(--bg-color); border: none; }
        .install-btn:hover { opacity: 0.9; transform: translateY(-1px);}

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .create-book-section { display: flex; gap: 10px; margin-bottom: 2.5rem; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; }
        
        .book-card {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px;
            cursor: pointer; transition: all 0.2s ease; position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow-sm);
        }
        .book-card:hover { border-color: var(--accent-color); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        
        .book-cover { 
            height: 240px; width: 100%; background: var(--default-cover); background-size: cover; 
            background-position: center; border-radius: 4px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05);
        }
        
        .book-info { text-align: center; padding: 4px; }
        .book-info h3 { margin: 0 0 4px 0; color: var(--text-primary); font-size: 1.1rem; font-weight: 600; font-family: var(--font-serif); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .book-info p { margin: 0; font-size: 0.85rem; color: var(--text-secondary); }

        .kebab-btn {
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0, 0, 0, 0.5); color: #FFFFFF;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; font-weight: bold; transition: all 0.2s ease; z-index: 10;
            backdrop-filter: blur(4px); padding-bottom: 4px; 
        }
        .kebab-btn:hover { background: rgba(0, 0, 0, 0.8); transform: scale(1.05); }

        .dropdown-menu {
            position: absolute; top: 60px; right: 20px;
            background: var(--container-bg); border: 1px solid var(--border-color);
            border-radius: 8px; box-shadow: var(--shadow-lg);
            display: flex; flex-direction: column; padding: 8px 0;
            z-index: 20; opacity: 0; pointer-events: none; transform: translateY(-10px);
            transition: all 0.2s ease; width: 170px;
        }
        .dropdown-menu.active {
            opacity: 1; pointer-events: auto; transform: translateY(0);
        }
        .dropdown-item {
            padding: 12px 16px; background: transparent; border: none; color: var(--text-primary);
            text-align: left; cursor: pointer; font-size: 0.85rem; font-family: var(--font-sans);
            transition: background 0.2s; width: 100%; font-weight: 500;
        }
        .dropdown-item:hover { background: var(--surface-hover); }
        .dropdown-item.danger { color: var(--danger-color); border-top: 1px solid var(--border-color); margin-top: 4px; }

        .playlist-header { display: flex; align-items: flex-end; gap: 30px; margin-bottom: 3rem; }
        .playlist-cover {
            width: 180px; height: 180px; border-radius: 4px; background-size: cover; background-position: center;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);
        }
        .playlist-info p { margin: 0 0 8px 0; font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px;}
        .playlist-info h1 { margin: 0 0 12px 0; font-size: 3rem; font-weight: 400; font-family: var(--font-serif); line-height: 1.1; color: var(--text-primary);}
        .playlist-info .stats { color: var(--accent-color); font-size: 0.95rem; font-weight: 500;}

        .controls-row { display: flex; gap: 10px; width: 100%; margin-bottom: 2rem; align-items: center; flex-wrap: wrap;}
        
        input[type="text"] { 
            flex: 1; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border-color); border-radius: 6px; 
            background: var(--container-bg); color: var(--text-primary); outline: none; box-sizing: border-box; transition: border-color 0.2s; font-family: var(--font-sans);
        }
        input[type="text"]:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(47, 92, 67, 0.1); }
        .dark-mode input[type="text"]:focus { box-shadow: 0 0 0 3px rgba(107, 154, 196, 0.2); }
        
        button.action-btn { 
            padding: 12px 24px; font-size: 0.95rem; font-weight: 500; background-color: var(--accent-color); color: #FFF; 
            border: 1px solid var(--accent-color); border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap; box-sizing: border-box; font-family: var(--font-sans);
        }
        button.action-btn:hover { background-color: var(--accent-hover); border-color: var(--accent-hover); }
        button.action-btn:active { transform: translateY(1px); }
        button.action-btn:disabled { background-color: var(--surface-hover); border-color: var(--border-color); color: var(--text-secondary); cursor: not-allowed; }
        
        .manual-btn { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .manual-btn:hover { border-color: var(--text-secondary); background-color: var(--surface-hover); }

        .error-message { color: var(--danger-color); font-size: 0.9rem; margin-bottom: 15px; display: none; font-weight: 500; background: rgba(181, 70, 70, 0.1); padding: 10px; border-radius: 6px;}
        
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 20px 16px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border-color);}
        
        th { color: var(--text-secondary); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border-color);}
        
        tr.word-row { transition: background-color 0.2s; }
        tr.word-row:hover { background-color: var(--surface-hover); }
        
        .td-word { font-weight: 600; color: var(--text-primary); font-size: 1.2rem; font-family: var(--font-serif); }
        .td-hindi { font-weight: 500; color: var(--text-primary); font-size: 1.05rem; }
        .td-synonyms { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; display: block;}
        .td-meaning { color: var(--text-primary); font-size: 0.95rem; }
        .td-usage { color: var(--text-secondary); font-size: 0.95rem; font-style: italic; border-left: 3px solid var(--border-color); padding-left: 15px;}
        
        .delete-row-btn {
            background: transparent; color: var(--text-secondary); border: none; font-size: 1.2rem; cursor: pointer; opacity: 0; transition: all 0.2s; padding: 4px 8px; border-radius: 4px;
        }
        tr.word-row:hover .delete-row-btn { opacity: 1; }
        .delete-row-btn:hover { color: var(--danger-color); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--container-bg); padding: 2.5rem; border-radius: 12px; width: 90%; max-width: 450px;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border-color);
        }
        .modal-content h2 { margin-top: 0; font-weight: 400; font-size: 1.5rem; color: var(--text-primary); font-family: var(--font-serif); margin-bottom: 1.5rem;}
        .modal-content input { width: 100%; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 1rem; justify-content: flex-end;}

        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .container { padding: 1.5rem; border-radius: 8px;}
            .nav-bar { flex-direction: column; align-items: flex-start; gap: 15px;}
            .playlist-header { flex-direction: column; align-items: center; text-align: center; gap: 20px;}
            .playlist-info h1 { font-size: 2.2rem; }
            .controls-row { flex-direction: column; }
            input[type="text"], button.action-btn { width: 100%; }
            tr.word-row .delete-row-btn { opacity: 1; } 
            
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.5rem; }
            .book-cover { height: 200px; }
            .kebab-btn { top: 15px; right: 15px; }
            .dropdown-menu { top: 55px; right: 15px; }
        }
    </style>
</head>
<body>

<div id="storageWarning">⚠️ Warning: Browser storage blocked. Books will disappear when closed. Please disable Private Browsing.</div>

<div id="manualAddModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Record New Word</h2>
        <input type="text" id="manWord" placeholder="Word (Required)">
        <input type="text" id="manHindi" placeholder="Meaning in Hindi (Optional)">
        <input type="text" id="manSyn" placeholder="Similar Words (comma separated)">
        <input type="text" id="manMeaning" placeholder="Definition">
        <input type="text" id="manUsage" placeholder="Usage in a sentence">
        <div class="modal-actions">
            <button class="focus-btn" onclick="closeManualModal()">Cancel</button>
            <button class="action-btn" onclick="saveManualWord()">Save to Notebook</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="nav-bar">
        <h2 class="nav-title">Vocab</h2>
        <div class="nav-actions">
            <button id="installBtn" class="focus-btn install-btn" style="display:none;" onclick="installPWA()">Install App</button>
            <button class="focus-btn" onclick="exportToExcel()" id="exportBtn" style="display:none;">Export to CSV</button>
            <button class="focus-btn" onclick="toggleTheme()" id="themeBtn">Focus: Night</button>
        </div>
    </div>

    <div id="dashboardView" class="view active">
        <div class="controls-row">
            <input type="text" id="newBookInput" placeholder="Create a new notebook (e.g. Physics 101, Dostoevsky)...">
            <button class="action-btn" onclick="createNewBook()">Create Notebook</button>
        </div>
        <div class="book-grid" id="bookGrid"></div>
    </div>

    <div id="dictionaryView" class="view">
        <button class="focus-btn" onclick="showDashboard()" style="margin-bottom: 2rem;">← Back to Library</button>
        
        <div class="playlist-header">
            <div id="currentBookCover" class="playlist-cover"></div>
            <div class="playlist-info">
                <p>Notebook</p>
                <h1 id="currentBookTitle">Book Name</h1>
                <p class="stats" id="currentBookStats">0 words recorded</p>
            </div>
        </div>
        
        <div class="controls-row">
            <input type="text" id="wordInput" placeholder="Look up a difficult word...">
            <button class="action-btn" id="searchBtn" onclick="fetchWordDetails()">Search Dictionary</button>
            <button class="action-btn manual-btn" onclick="openManualModal()">+ Add Custom</button>
        </div>
        
        <div id="errorMsg" class="error-message">Word not found in the database. Please try adding it manually.</div>
        
        <div class="table-wrapper">
            <table id="wordTable">
                <thead>
                    <tr>
                        <th style="width: 5%;">No.</th>
                        <th style="width: 15%;">Vocabulary</th>
                        <th style="width: 15%;">Hindi (हिन्दी)</th>
                        <th style="width: 15%;">Similar Words</th>
                        <th style="width: 25%;">Definition</th>
                        <th style="width: 20%;">Context</th>
                        <th style="width: 5%;"></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let libraryData = {}; 
    let libraryCovers = {}; 
    let currentBook = null;
    let storageAvailable = true; 

    document.addEventListener('DOMContentLoaded', () => {
        setupPWA(); testStorage(); loadTheme(); loadData(); renderDashboard();
    });

    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('active'));
    });

    function testStorage() {
        try { localStorage.setItem('test', '1'); localStorage.removeItem('test'); storageAvailable = true; } 
        catch (e) { storageAvailable = false; document.getElementById('storageWarning').style.display = 'block'; }
    }

    function loadData() {
        if (!storageAvailable) return; 
        try {
            const savedLib = localStorage.getItem('academicDict_Library');
            if (savedLib) { libraryData = JSON.parse(savedLib); } 

            const savedCov = localStorage.getItem('academicDict_Covers');
            if (savedCov) { libraryCovers = JSON.parse(savedCov); }
        } catch (e) { console.error("Error loading", e); }
    }

    function saveData() {
        if (!storageAvailable) return; 
        try {
            localStorage.setItem('academicDict_Library', JSON.stringify(libraryData));
            localStorage.setItem('academicDict_Covers', JSON.stringify(libraryCovers));
        } catch (e) { alert("Storage full. Cannot save new data."); }
    }

    function toggleTheme() {
        const body = document.body; const themeBtn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        
        themeBtn.innerText = isDark ? 'Focus: Paper' : 'Focus: Night';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#17181A' : '#F4F1EA');
        
        if (storageAvailable) {
            try { localStorage.setItem('themePref_academic', isDark ? 'dark' : 'light'); } catch(e) { }
        }
    }

    function loadTheme() {
        if (!storageAvailable) return;
        try {
            const pref = localStorage.getItem('themePref_academic');
            if (pref === 'dark') { 
                document.body.classList.add('dark-mode'); 
                document.getElementById('themeBtn').innerText = 'Focus: Paper'; 
                document.querySelector('meta[name="theme-color"]').setAttribute('content', '#17181A');
            }
        } catch(e) { }
    }

    let deferredPrompt;
    function setupPWA() {
        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"><rect width="512" height="512" fill="#F4F1EA" rx="100"/><text x="50%" y="54%" font-family="'Georgia', serif" font-size="360" font-weight="bold" fill="#2F5C43" text-anchor="middle" dominant-baseline="middle">V</text></svg>`;
        const img = new Image(); img.onload = () => {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            const pngUrl = canvas.toDataURL('image/png');
            document.head.insertAdjacentHTML('beforeend', `<link rel="icon" type="image/png" href="${pngUrl}"><link rel="apple-touch-icon" href="${pngUrl}">`);
            const manifest = { name: "Vocab", short_name: "Vocab", display: "standalone", background_color: "#F4F1EA", theme_color: "#2F5C43", icons: [{ src: pngUrl, sizes: "512x512", type: "image/png" }] };
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'}))}">`);
        }; img.src = URL.createObjectURL(new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' }));
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'inline-block'; });
    }
    function installPWA() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then((c) => { if (c.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none'; deferredPrompt = null; }); } }

    function toggleMenu(event, index) {
        event.stopPropagation(); 
        
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            if (menu.id !== `dropdown-${index}`) {
                menu.classList.remove('active');
            }
        });
        
        const dropdown = document.getElementById(`dropdown-${index}`);
        dropdown.classList.toggle('active');
    }

    function renderDashboard() {
        const grid = document.getElementById('bookGrid'); grid.innerHTML = '';
        const books = Object.keys(libraryData);
        if (books.length === 0) { grid.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1 / -1; text-align: center; margin-top: 40px; font-size: 1.1rem;">Your library is empty. Create a notebook to begin.</p>'; return; }

        books.forEach((bookName, index) => {
            const wordCount = libraryData[bookName].length;
            const coverImage = libraryCovers[bookName] ? `url(${libraryCovers[bookName]})` : 'var(--default-cover)';
            const card = document.createElement('div'); card.className = 'book-card';
            
            card.onclick = () => openBook(bookName);
            
            card.innerHTML = `
                <div class="book-cover" style="background-image: ${coverImage};"></div>
                <button class="kebab-btn" onclick="toggleMenu(event, ${index})">&#8942;</button>
                <div class="dropdown-menu" id="dropdown-${index}">
                    <button class="dropdown-item" onclick="triggerImageUpload(event, '${bookName}')">📁 Custom Cover</button>
                    <button class="dropdown-item" onclick="searchWebCover(event, '${bookName}')">🌐 Web Cover</button>
                    <button class="dropdown-item danger" onclick="deleteBook(event, '${bookName}')">🗑️ Delete</button>
                </div>
                <div class="book-info"><h3>${bookName}</h3><p>${wordCount} word${wordCount !== 1 ? 's' : ''}</p></div>
            `;
            grid.appendChild(card);
        });
    }

    async function searchWebCover(event, bookName) {
        event.stopPropagation();
        try {
            const res = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(bookName)}&limit=15`);
            const data = await res.json();
            
            const resultsWithCovers = data.docs.filter(d => d.cover_i);
            
            if(resultsWithCovers.length === 0) {
                alert(`No cover found online for this book title.`); 
            } else { 
                const randomIndex = Math.floor(Math.random() * resultsWithCovers.length);
                const randomCoverId = resultsWithCovers[randomIndex].cover_i;
                libraryCovers[bookName] = `https://covers.openlibrary.org/b/id/${randomCoverId}-L.jpg`; 
                saveData(); renderDashboard(); 
            }
        } catch(e) { alert("Network error while searching for a cover."); } 
    }

    function triggerImageUpload(event, bookName) {
        event.stopPropagation(); const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
        input.onchange = (e) => {
            if (!e.target.files[0]) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); let w = img.width; let h = img.height;
                    if (w > h) { if (w > 300) { h *= 300 / w; w = 300; } } else { if (h > 450) { w *= 450 / h; h = 450; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    libraryCovers[bookName] = canvas.toDataURL('image/jpeg', 0.8); saveData(); renderDashboard();
                }; img.src = ev.target.result;
            }; reader.readAsDataURL(e.target.files[0]);
        }; input.click();
    }

    function createNewBook() {
        const input = document.getElementById('newBookInput'); const bookName = input.value.trim();
        if (!bookName) return; if (libraryData[bookName]) return alert("A notebook with this name already exists.");
        libraryData[bookName] = []; saveData(); input.value = ''; renderDashboard();
    }

    function deleteBook(event, bookName) {
        event.stopPropagation(); 
        if (confirm(`Delete the notebook "${bookName}" and all its contents?`)) { delete libraryData[bookName]; delete libraryCovers[bookName]; saveData(); renderDashboard(); }
    }

    function showDashboard() { 
        document.getElementById('exportBtn').style.display = 'none';
        document.getElementById('dictionaryView').classList.remove('active'); 
        document.getElementById('dashboardView').classList.add('active'); 
        currentBook = null; renderDashboard(); 
    }
    
    function openBook(bookName) { 
        currentBook = bookName; 
        document.getElementById('currentBookTitle').innerText = bookName; 
        document.getElementById('currentBookCover').style.backgroundImage = libraryCovers[bookName] ? `url(${libraryCovers[bookName]})` : 'var(--default-cover)';
        document.getElementById('exportBtn').style.display = 'inline-block';
        document.getElementById('dashboardView').classList.remove('active'); 
        document.getElementById('dictionaryView').classList.add('active'); 
        renderTable(); 
    }

    document.getElementById("wordInput").addEventListener("keypress", (e) => { if (e.key === "Enter") fetchWordDetails(); });
    document.getElementById("newBookInput").addEventListener("keypress", (e) => { if (e.key === "Enter") createNewBook(); });

    async function fetchWordDetails() {
        const inputElement = document.getElementById('wordInput'); const btn = document.getElementById('searchBtn');
        const word = inputElement.value.trim().toLowerCase(); const err = document.getElementById('errorMsg');
        if (!word || !currentBook) return; err.style.display = 'none';
        if (libraryData[currentBook].some(e => e.word.toLowerCase() === word)) { inputElement.value = ''; alert(`"${word}" is already in this notebook.`); return; }

        btn.innerText = "Searching..."; btn.disabled = true;
        try {
            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            if (!dictRes.ok) throw new Error("Word not found");
            const dictData = await dictRes.json();
            
            let meaning = "-", usage = "-";
            if (dictData && dictData[0] && dictData[0].meanings) {
                const first = dictData[0].meanings[0];
                if (first.definitions[0]) meaning = first.definitions[0].definition;
                for (let m of dictData[0].meanings) {
                    for (let d of m.definitions) { if (d.example && usage === "-") { usage = d.example; break; } }
                    if (usage !== "-") break;
                }
            }
            
            let synString = "-";
            try {
                const synRes = await fetch(`https://api.datamuse.com/words?rel_syn=${word}&max=4`);
                const synData = await synRes.json();
                if (synData && synData.length > 0) { synString = synData.map(item => item.word).join(", "); } 
                else {
                    const mlRes = await fetch(`https://api.datamuse.com/words?ml=${word}&max=4`);
                    const mlData = await mlRes.json();
                    if (mlData && mlData.length > 0) synString = mlData.map(item => item.word).join(", ");
                }
            } catch (synError) { console.log("Datamuse failed."); }

            let hindiString = "-";
            try {
                const hiRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|hi`);
                const hiData = await hiRes.json();
                if (hiData && hiData.responseData && hiData.responseData.translatedText) {
                    const translated = hiData.responseData.translatedText;
                    if (translated.toLowerCase() !== word.toLowerCase()) hindiString = translated;
                }
            } catch (hiError) { console.log("Hindi translation failed."); }

            libraryData[currentBook].push({ word, hindi: hindiString, meaning, usage, synonyms: synString }); 
            saveData(); renderTable(); inputElement.value = '';

        } catch (error) { err.style.display = 'block'; } finally { btn.innerText = "Search Dictionary"; btn.disabled = false; }
    }

    function openManualModal() { document.getElementById('manualAddModal').style.display = 'flex'; }
    function closeManualModal() { 
        document.getElementById('manualAddModal').style.display = 'none'; 
        document.getElementById('manWord').value = ''; document.getElementById('manHindi').value = ''; document.getElementById('manSyn').value = '';
        document.getElementById('manMeaning').value = ''; document.getElementById('manUsage').value = '';
    }
    
    function saveManualWord() {
        const word = document.getElementById('manWord').value.trim();
        if(!word) return alert("Word is required.");
        if (libraryData[currentBook].some(e => e.word.toLowerCase() === word.toLowerCase())) return alert("Already saved.");
        
        let hindi = document.getElementById('manHindi').value.trim() || "-";
        let syn = document.getElementById('manSyn').value.trim() || "-";
        let mean = document.getElementById('manMeaning').value.trim() || "-";
        let use = document.getElementById('manUsage').value.trim() || "-";
        
        libraryData[currentBook].push({ word, hindi: hindi, meaning: mean, usage: use, synonyms: syn });
        saveData(); renderTable(); closeManualModal();
    }

    function deleteRow(index) {
        if(confirm("Remove this word from your notebook?")) {
            libraryData[currentBook].splice(index, 1); saveData(); renderTable();
        }
    }

    function renderTable() {
        const tBody = document.getElementById('tableBody'); tBody.innerHTML = ''; 
        const currentData = libraryData[currentBook];
        document.getElementById('currentBookStats').innerText = `${currentData.length} entries`;

        if (currentData.length === 0) { 
            tBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 60px 20px; color:var(--text-secondary); font-size: 1.1rem;">This notebook is empty.</td></tr>'; 
            return; 
        }
        
        currentData.forEach((entry, i) => { 
            const synText = entry.synonyms || "-"; 
            const hindiText = entry.hindi || "-";
            const row = document.createElement('tr'); row.className = 'word-row';
            
            row.innerHTML = `
                <td style="color:var(--text-secondary);">${i + 1}</td>
                <td><span class="td-word">${entry.word}</span></td>
                <td><span class="td-hindi">${hindiText}</span></td>
                <td><span class="td-synonyms">${synText}</span></td>
                <td class="td-meaning">${entry.meaning}</td>
                <td class="td-usage">${entry.usage !== "-" ? `"${entry.usage}"` : "-"}</td>
                <td style="text-align:right;"><button class="delete-row-btn" onclick="deleteRow(${i})">✕</button></td>
            `; 
            tBody.appendChild(row); 
        });
    }

    function exportToExcel() {
        const cData = libraryData[currentBook]; if (!cData || cData.length === 0) return alert("Notebook is empty.");
        let csv = "Sr No.,Word,Hindi,Similar Words,Definition,Context\n";
        cData.forEach((e, i) => { 
            let w = e.word.replace(/"/g, '""'); let h = (e.hindi||"-").replace(/"/g, '""'); let s = (e.synonyms||"-").replace(/"/g, '""');
            let m = e.meaning.replace(/"/g, '""'); let u = e.usage.replace(/"/g, '""'); 
            csv += `${i + 1},"${w}","${h}","${s}","${m}","${u}"\n`; 
        });
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `${currentBook.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_glossary.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
